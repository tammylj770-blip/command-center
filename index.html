<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="L&M Command">
<title>L&M Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f2f2f7;color:#1a1a1a;}
#hdr{background:#1a1a1a;padding:12px 14px 10px;position:sticky;top:0;z-index:99;border-top:3px solid #E91E8C;}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.badge{background:#E91E8C;color:#fff;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:700;}
.bname{color:#fff;font-size:14px;font-weight:600;}
.btag{color:#888;font-size:10px;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab{border:none;border-radius:6px;padding:6px 11px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.1);color:#bbb;cursor:pointer;}
.tab.on{background:#E91E8C;color:#fff;}
#main{padding:14px 12px 80px;}
.card{background:#fff;border-radius:10px;border:1px solid #e5e5e5;padding:13px 15px;margin-bottom:10px;}
.cl{border-left:3px solid #E91E8C;}
.ct{border-left:3px solid #00BCD4;}
.metrics{display:flex;gap:8px;margin-bottom:16px;}
.met{background:#f0f0f0;border-radius:8px;padding:11px 13px;flex:1;}
.mlbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.mval{font-size:19px;font-weight:700;color:#1a1a1a;}
.msub{font-size:11px;color:#999;margin-top:2px;}
.slbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;}
.pill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.rc{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center;}
.n14{font-size:14px;font-weight:600;}
.n12{font-size:12px;color:#666;margin-top:2px;}
.n11{font-size:11px;color:#888;margin-top:3px;}
.netval{font-size:16px;font-weight:700;color:#E91E8C;}
input,select,textarea{width:100%;padding:9px 11px;border-radius:7px;border:1px solid #ccc;background:#f8f8f8;color:#1a1a1a;font-size:14px;font-family:inherit;margin-top:3px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#E91E8C;}
.flbl{font-size:12px;color:#666;margin-top:8px;display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btns{display:flex;gap:8px;margin-top:12px;}
.btn{border-radius:7px;border:1.5px solid #ccc;background:transparent;color:#1a1a1a;font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer;font-family:inherit;}
.bp{background:#E91E8C;border-color:#E91E8C;color:#fff;}
.bt{background:#00BCD4;border-color:#00BCD4;color:#fff;}
.bd{border-color:#e53935;color:#e53935;}
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.editbox{background:#fff;border:2px solid #00BCD4;border-radius:10px;padding:13px 15px;margin-bottom:10px;}
.preblock{white-space:pre-wrap;font-family:inherit;font-size:13px;color:#1a1a1a;background:#f5f5f5;border-radius:6px;padding:12px;margin:10px 0;line-height:1.6;}
.dlrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.commbox{background:#f0f0f0;border-radius:8px;padding:10px 13px;margin:10px 0;display:flex;gap:18px;flex-wrap:wrap;}
.cml{font-size:11px;color:#666;}
.cmv{font-size:14px;font-weight:700;margin-top:2px;}
</style>
</head>

function ls(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function usd(n){return'$'+Math.round(Number(n)||0).toLocaleString();}
function fd(d){if(!d)return'';var p=d.split('-');return p[1]+'/'+p[2]+'/'+p[0];}
function ad(ds,days){if(!ds)return'';var d=new Date(ds);d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];}
function net(c){return((Number(c.salePrice)*Number(c.commRate))/100)-Number(c.tcFee)-Number(c.referralFee);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pill(t,col){return'<span class="pill" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44">'+esc(t)+'</span>';}

// Render tabs
function rTabs(){
  document.getElementById('tabs').innerHTML=TAB.map(function(t,i){
    return '<button class="tab'+(t===cur?' on':'')+'" onclick="go(\''+t+'\')">'+TLBL[i]+'</button>';
  }).join('');
}

function go(t){cur=t;rTabs();render();}

// Main render
function render(){
  var m=document.getElementById('main');
  if(cur==='home')m.innerHTML=rHome();
  else if(cur==='contacts')m.innerHTML=rContacts();
  else if(cur==='pipeline')m.innerHTML=rPipeline();
  else if(cur==='closings')m.innerHTML=rClosings();
  else if(cur==='transactions')m.innerHTML=rTransactions();
  else if(cur==='email')m.innerHTML=rEmail();
  else if(cur==='leadgen')m.innerHTML=rLeadGen();
  else if(cur==='social')m.innerHTML=rSocial();
}

// HOME
function rHome(){
  var nt=closings.reduce(function(s,c){return s+net(c);},0);
  var vt=closings.reduce(function(s,c){return s+Number(c.salePrice);},0);
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">';
  h+='<div style="width:4px;height:36px;background:linear-gradient('+PINK+','+TURQ+');border-radius:2px;"></div>';
  h+='<div><div style="font-size:17px;font-weight:700;">Tammy Plamondon, Licensed Broker</div>';
  h+='<div class="n12">Loft &amp; Main Realty Group · Cedartown, GA · GA &amp; AL since 2014</div></div></div>';
  h+='<div class="metrics">';
  h+='<div class="met"><div class="mlbl">2026 Net</div><div class="mval" style="color:'+PINK+'">'+usd(nt)+'</div><div class="msub">'+closings.length+' ends</div></div>';
  h+='<div class="met"><div class="mlbl">Volume</div><div class="mval">'+usd(vt)+'</div><div class="msub">closed</div></div>';
  h+='<div class="met"><div class="mlbl">Pipeline</div><div class="mval">'+pipeline.length+'</div><div class="msub">deals</div></div>';
  h+='</div>';
  h+='<div class="slbl">Active Pipeline</div>';
  pipeline.forEach(function(p){
    var col=SC[p.stage]||TURQ;
    h+='<div class="card" style="border-left:3px solid '+col+'">';
    h+='<div class="row"><div><div class="n14">'+esc(p.contact)+'</div>';
    h+='<div class="n12">'+esc(p.address)+'</div>';
    h+='<div class="n12">'+usd(p.price)+' · '+esc(p.loanType)+(p.lender?' · '+esc(p.lender):'')+'</div></div>';
    h+='<div style="text-align:right;flex-shrink:0;">'+pill(p.stage,col);
    if(p.closeDate)h+='<div class="n12" style="margin-top:4px;">Close: '+fd(p.closeDate)+'</div>';
    h+='</div></div></div>';
  });
  h+='<div class="slbl">Recent Closings</div>';
  closings.slice().reverse().slice(0,3).forEach(function(c){
    h+='<div class="card cl"><div class="rc">';
    h+='<div><div class="n14">'+esc(c.contact)+'</div><div class="n12">'+fd(c.closeDate)+' · '+esc(c.side)+' · '+esc(c.agent)+'</div></div>';
    h+='<div style="text-align:right;"><div class="netval">'+usd(net(c))+'</div><div style="font-size:11px;color:#999;">net</div></div>';
    h+='</div></div>';
  });
  return h;
}

// CONTACTS
function rContacts(){
  var srcs=['All'].concat(contacts.map(function(c){return c.source;}).filter(function(v,i,a){return a.indexOf(v)===i;}));
  var shown=cFilt==='All'?contacts:contacts.filter(function(c){return c.source===cFilt;});
  var h='<div class="frow">';
  srcs.forEach(function(s){h+='<button class="btn'+(cFilt===s?' bp':'')+'" style="padding:6px 12px;font-size:12px;" onclick="setCF(\''+esc(s)+'\')">'+esc(s)+'</button>';});
  h+='<button class="btn bt" style="padding:6px 12px;font-size:12px;margin-left:auto;" onclick="toggleCA()">+ Add</button></div>';
  if(cAdd)h+=cForm(null);
  shown.forEach(function(c){h+=cEdit===c.id?cForm(c):cCard(c);});
  return h;
}
function cCard(c){
  var col=SC[c.status]||'#888';
  var h='<div class="card"><div class="row">';
  h+='<div style="flex:1;min-width:0;"><div class="n14">'+esc(c.name)+'</div>';
  if(c.phone||c.email)h+='<div class="n12">'+(c.phone?esc(c.phone):'')+(c.phone&&c.email?' · ':'')+( c.email?esc(c.email):'')+'</div>';
  h+='<div class="pills">'+pill(c.status,col)+' '+pill(c.source,TURQ)+'<span style="font-size:11px;color:#999;">'+esc(c.agent)+'</span></div>';
  if(c.notes)h+='<div class="n11">'+esc(c.notes)+'</div>';
  h+='</div><div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px;">';
  h+='<button class="btn" style="padding:5px 10px;font-size:12px;" onclick="editC('+c.id+')">Edit</button>';
  h+='<button class="btn bd" style="padding:5px 10px;font-size:12px;" onclick="delC('+c.id+')">✕</button>';
  h+='</div></div></div>';
  return h;
}
function cForm(c){
  var v=c||{name:'',phone:'',email:'',source:'Social Media',status:'Lead',notes:'',agent:'Tammy'};
  var px=c?'ce'+c.id:'cn';
  var h='<div class="editbox">';
  h+='<div class="g2">';
  h+='<div><label class="flbl">Name</label><input id="'+px+'_nm" value="'+esc(v.name)+'"></div>';
  h+='<div><label class="flbl">Phone</label><input id="'+px+'_ph" value="'+esc(v.phone)+'"></div>';
  h+='<div><label class="flbl">Email</label><input id="'+px+'_em" value="'+esc(v.email)+'"></div>';

// CLOSINGS
function rClosings(){
  var nt=closings.reduce(function(s,c){return s+net(c);},0);

  var h='<div class="metrics">';
  h+='<div class="met"><div class="mlbl">Total Net</div><div class="mval" style="color:'+PINK+'">'+usd(nt)+'</div><div class="msub">'+closings.length+' ends</div></div>';
  h+='<div class="met"><div class="mlbl">Volume</div><div class="mval">'+usd(vt)+'</div></div>';
  h+='<div class="met"><div class="mlbl">Avg Net</div><div class="mval">'+(closings.length?usd(nt/closings.length):'$0')+'</div></div>';
  h+='</div><div style="display:flex;justify-content:flex-end;margin-bottom:12px;"><button class="btn bt" onclick="toggleCLA()">+ Add Closing</button></div>';

// TRANSACTIONS
function rTransactions(){
  if(!pipeline.length)return'<div style="font-size:13px;color:#888;">No active deals. Add in Pipeline tab.</div>';
  if(!txSel||!pipeline.find(function(p){return p.id===txSel;})){txSel=pipeline[0].id;}
  var tx=pipeline.find(function(p){return p.id===txSel;})||pipeline[0];
  var today=new Date().toISOString().split('T')[0];
  var h='<div class="g2" style="margin-bottom:14px;">';
  h+='<div><label class="flbl">Transaction</label><select onchange="setTxS(this.value)">';
  pipeline.forEach(function(p){h+='<option value="'+p.id+'"'+(p.id===txSel?' selected':'')+'>'+esc(p.contact)+'</option>';});
  h+='</select></div>';
  h+='<div><label class="flbl">Binding Date</label><input type="date" value="'+txBind+'" onchange="setTxB(this.value)"></div></div>';
  if(tx){
    h+='<div class="card cl" style="margin-bottom:16px;">';
    h+='<div class="n14">'+esc(tx.contact)+'</div>';
    h+='<div class="n12">'+esc(tx.address)+'</div>';
    h+='<div class="n12">'+usd(tx.price)+' · '+esc(tx.loanType)+' · Close: '+fd(tx.closeDate)+'</div>';
    if(tx.lender)h+='<div class="n12">Lender: '+esc(tx.lender)+' · Attorney: '+esc(tx.attorney)+'</div>';
    h+='</div>';
  }
  if(!txBind){h+='<div style="font-size:13px;color:#888;">Enter binding date to auto-calculate deadlines.</div>';return h;}
  var dls=(DL[tx.loanType]||DL.Other).map(function(d){return Object.assign({},d,{date:d.r?ad(tx.closeDate,d.d):ad(txBind,d.d)});});
  h+='<div class="slbl">'+esc(tx.loanType)+' Timeline</div>';
  dls.forEach(function(d){
    var diff=Math.round((new Date(d.date)-new Date(today))/86400000);
    var past=diff<0,close2=!past&&diff<=3,isC=d.l==='Closing';
    var col=isC?PINK:past?'#ccc':close2?'#FF9800':TURQ;
    h+='<div class="dlrow"><div class="dot" style="background:'+col+'"></div>';
    h+='<div style="flex:1;font-size:13px;color:'+(past?'#aaa':'#1a1a1a')+';text-decoration:'+(past?'line-through':'none')+';font-weight:'+(isC?700:400)+'>'+esc(d.l)+'</div>';
    h+='<div style="text-align:right;"><div style="font-size:13px;font-weight:700;color:'+col+'">'+fd(d.date)+'</div>';
    h+='<div style="font-size:11px;color:#999;">'+(past?'passed':diff===0?'today':diff+'d away')+'</div></div></div>';
  });
  return h;
}
window.setTxS=function(v){txSel=Number(v);render();};
window.setTxB=function(v){txBind=v;render();};
